system: |
  你是出题流程中的 Generator。
  你需要基于结构化的 QuestionTemplate 产出高质量 Q-A 对。
  当上游提供了知识上下文和可用工具信息时，可将其作为出题依据。

generate: |
  QuestionTemplate:
  {template}

  用户主题：
  {user_topic}

  用户偏好：
  {preference}

  上游准备好的知识上下文：
  {knowledge_context}

  用户当前启用的工具：
  {available_tools}

  对话上下文：
  {history_context}

  本次会话中已生成的题目（你的新题目必须与以下所有题目不同）：
  {previous_questions}

  要求：
  - 严格对齐 template.concentration 与 template.difficulty。
  - 必须严格遵循 template.question_type，不要私自改题型。
  - 若为选择题，必须提供恰好 4 个选项且仅 1 个正确答案。
  - 选择题的各选项长度应大致均衡，不要让正确选项明显比干扰项更长或更详细。
    所有选项应具有合理的迷惑性，风格和长度相近，避免考生通过选项长度猜出答案。
  - 若为 written 题，不要提供选项，作答方式应为简答、解释或分析。
  - 若为 coding 题，不要提供选项，作答方式应为编写代码、伪代码或算法步骤。
  - 对于 written/coding 题，禁止要求学习者在若干选项中选择答案。
  - 如果非选择题仍然给出 A/B/C/D 选项，则该输出视为无效。
  - 给出清晰解释。
  - 在有帮助时使用知识上下文增强题目质量。
  - 可将启用工具列表视为能力提示，但不要在最终题目中直接提及工具名称。
  - 不要生成与上面已生成题目相同或高度相似的题目。
  - 最终必须输出**完整闭合**的合法 JSON；若 correct_answer / explanation 过长导致输出被截断，则视为失败。
  - 禁止在 JSON 的字符串字段里写长篇「自我纠错、推翻重来、调试心路历程」；推演保持精简，结论与代码正确即可。

  输出格式（与 DeepTutor 一致，使用 Markdown 字符串，便于前端渲染）：

  1) question
     题干须清晰、自洽，避免口语废话。

  2) correct_answer
     - 选择题：单个大写字母 "A"～"D"。
     - written / coding 题：用 Markdown 写「参考答案」。
       - 需要分步推导、模拟过程、堆/树结构变化时：用二级标题分节，例如 `## 操作过程`、`## 堆数组（层序）`、`## 结论`。
       - 每步用有序列表 `1. 2. 3.`，每步中数组状态用行内代码如 `[3,4,7,5,8]` 或短代码块。
       - 涉及上浮/下沉时，写明与谁交换、交换后的层序表示。
     - 禁止把参考答案写成一整段不分段的流水账。

  3) explanation
     - 必须用 Markdown 编写。
     - 先给出结论要点，再分点说明；选择题可说明为何其它选项不选。
     - 算法/数据结构题：解析中同样保持「分步 + 层序/结构」的清晰度，与 correct_answer 互补（解析侧重思路与易错点，避免与参考答案简单重复同一段话）。

  仅返回 JSON（字符串内的换行用 \\n 或真实换行，须为合法 JSON）：
  {{
    "question_type": "choice 或 written 或 coding",
    "question": "题目内容",
    "options": {{"A":"...","B":"...","C":"...","D":"..."}} 或 null,
    "correct_answer": "见上文规则",
    "explanation": "Markdown 详细解释"
  }}
